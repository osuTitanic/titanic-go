name: CI Build

on:
  workflow_run:
    workflows: ["CI Test"]
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: ci-build-${{ github.event.workflow_run.head_repository.full_name }}-${{ github.event.workflow_run.head_branch || github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  prepare:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.workflow_run.head_repository.full_name }}
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Prepare build matrix
        id: matrix
        run: |
          matrix="$(
            jq -c '
              {
                include: [
                  .services[] as $service
                  | $service.platforms[] as $platform
                  | ($platform | capture("(?<goos>[^/]+)/(?<goarch>[^/]+)(?:/v(?<goarm>[0-9]+))?")) as $target
                  | {
                      service: $service.name,
                      go_build_path: $service.go_build_path,
                      platform: $platform,
                      goos: $target.goos,
                      goarch: $target.goarch,
                      goarm: ($target.goarm // "")
                    }
                ]
              }
            ' .github/services.json
          )"

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    needs: prepare
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.workflow_run.head_repository.full_name }}
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cross-compile service
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          suffix=""
          if [ -n "$GOARM" ]; then
            suffix="-v$GOARM"
          fi

          output="/tmp/${{ matrix.service }}-$GOOS-$GOARCH$suffix"

          go build -trimpath -o "$output" "${{ matrix.go_build_path }}"
